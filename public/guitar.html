<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="index.css">
  <title>Guitar Practice</title>
  <link rel="icon" href="images/logo.png" type="image/icon type">
</head>

<!-- Google tag (gtag.js) -->

  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

<body class="dsa-page">

  <nav class="navbar">
    <a href="index.html">Home</a>
    <a href="experience.html">Experience</a>
    <a href="film.html">Film</a>
    <a href="blog.html">Blog</a>
    <button id="theme-toggle" class="theme-btn">◆</button>
  </nav>

  <div class="container">
    <p class="dsa-title">Guitar Practice</p>
    <p class="dsa-subtitle">
      Daily Guitar practice logs via YouTube. Most clips live in this playlist:
      <a href="https://www.youtube.com/playlist?list=PLOOEcr8flEUQKD08-AmKlSv-eydxa3Ot6" target="_blank" rel="noopener noreferrer">learning guitar playlist →</a>
    </p>

    <div class="dsa-list" id="guitar-list">
      <p class="dsa-muted">
        Loading Guitar videos…
      </p>
    </div>
  </div>

  <script>
    (function () {
      const container = document.getElementById("guitar-list");
      if (!container) return;

      container.innerHTML = '<p class="dsa-muted">Loading Guitar videos…</p>';

      fetch("/api/guitar-videos")
        .then((res) => (res.ok ? res.json() : Promise.reject(res)))
        .then((data) => {
          if (!data || !Array.isArray(data.items) || !data.items.length) {
            container.innerHTML = '<p class="dsa-muted">No Guitar videos yet.</p>';
            return;
          }

          const list = document.createElement("ul");
          list.className = "dsa-items";

          data.items.forEach((item) => {
            const title = item.title || "Untitled video";

            const li = document.createElement("li");
            const link = document.createElement("a");
            link.href = item.url;
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.textContent = title;

            li.appendChild(link);
            list.appendChild(li);
          });

          container.innerHTML = "";
          container.appendChild(list);
        })
        .catch(() => {
          container.innerHTML =
            '<p class="dsa-muted">Could not load Guitar videos yet.</p>';
        });
    })();
  </script>

  <script defer src="js/theme.js"></script>
</body>
</html>
